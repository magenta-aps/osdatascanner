{% load i18n %}

<!DOCTYPE html>
<html lang="">
  <head>
    <title>{% translate "Developer credits" %}</title>
    <style>
* {
    text-align: center;
}
.screen-reader-only {
    display: none;
}

svg {
    width: 60%;
    margin-left: auto;
    margin-right: auto;
}

/* Carousel hacked up from https://blog.logto.io/css-only-infinite-scroll */

div.carousel {
    margin: 0 auto;
    padding: 20px 0;
    max-width: 700px;
    overflow: hidden;
    display: flex;
}

div.carousel div.group {
    display: flex;
    gap: 20px;
    padding-right: 20px;

    will-change: transform;
    animation-name: scrolling;
    animation-duration: 45s;
    animation-timing-function: linear;
    animation-delay: 5s;
    animation-iteration-count: infinite;
}

@keyframes scrolling {
    0% {
        transform: translateX(0);
    }

    100% {
        transform: translateX(-100%);
    }
}

div.carousel div.group div.card {
    width: 200px;
    color: white;
    border-radius: 24px;
    box-shadow: rgba(0, 0, 0, 10%) 5px 5px 20px 0;
    padding: 20px;
    justify-content: center;
    align-items: center;

    height: fit-content;
    min-height: 200px;

    &:nth-child(odd) {
      background-color: #3b88b0;
    }

    &:nth-child(even) {
      background-color: #569fc7;
    }
}
    </style>
  </head>
  <body>
    {% include "components/common/logo-o.html" %}
    <div class="carousel">
      {% for _ in repetitions %}
        <div {% if forloop.last %}aria-hidden{% endif %}class="group">
          {% for person in everybody %}
            <div class="card">
              <h3>{{ person.name }}</h3>
              {% if person.quote %}<q>{{ person.quote }}</q>{% endif %}
            </div>
          {% endfor %}
        </div>
      {% endfor %}
    </div>
  </body>
</html>
