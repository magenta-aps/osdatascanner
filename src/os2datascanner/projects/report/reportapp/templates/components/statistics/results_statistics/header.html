{% load i18n l10n %}

<div class="content-header">
  <h1 class="page-title">{{ page_title }}</h1>

  {% include "components/common/page_load_indicator.html" %}

  <!-- Scannerjob chart data selection -->
  <form name="stat_form"
        class="stat_form"
        hx-get="{{ filter_url }}"
        hx-target=".content"
        hx-select=".content"
        hx-swap="outerHTML"
        hx-trigger="change"
        hx-indicator="#report-page-indicator">
    <!-- Org unit chart data selection -->
    <div class="dropdown stats_dropdown">
      <label for="orgunits">{% trans "organizational unit"|capfirst %}</label>
      <select name="orgunit" id="orgunits" data-compareto="all" autocomplete="off">
        <option value="all"
                {% if chosen_orgunit == "all" %}selected="selected"{% endif %}>{% trans "all"|capfirst %}</option>
        {% for unit in orgunit_choices %}
          <option value="{{ unit.uuid }}"
                  {% if chosen_orgunit == unit.uuid|stringformat:"s" %}selected="selected"{% endif %}>
            {{ unit.name }}
          </option>
        {% endfor %}
      </select>
    </div>
    <div class="dropdown stats_dropdown">
      <label for="scannerjobs">{% trans "scanner job"|capfirst %}</label>
      <select name="scannerjob"
              id="scannerjobs"
              data-compareto="all"
              autocomplete="off">
        <option value="all"
                {% if chosen_scannerjob == "all" %}selected="selected"{% endif %}>
          {% trans "all scanner jobs"|capfirst %}
        </option>
        {% for scan in scannerjob_choices %}
          <option value="{{ scan.scanner_pk|unlocalize }}"
                  {% if chosen_scannerjob == scan.scanner_pk|stringformat:"i" %}selected="selected"{% endif %}>
            {{ scan.scanner_name }}
          </option>
        {% endfor %}
      </select>
    </div>
    <!-- Clear button -->
    <div class="form__buttons">
      <div class="button-group">
        <button type="button"
                class="button button--transparent-button"
                aria-label="{% trans "Reset selected filters in the overview" %}"
                title="{% trans "Remove selected filters and refresh the overview" %}"
                name="clear_scannerjob"
                hx-trigger="click"
                hx-get="{{ request.path }}"
                hx-swap="outerHTML"
                hx-target=".content"
                hx-select=".content"
                hx-include="[id='filter_form'], [id='dropdown_options']"
                hx-params="not scannerjob"
                hx-indicator="#report-page-indicator">{% trans "reset"|capfirst %}</button>
        {% if csv_export_enabled %}
          <hr class="button-group__divider">
          <a href="{{ csv_export_url }}?{{ request.GET.urlencode }}"
             class="button button--transparent-button"
             aria-label="{% trans "Export CSV of the shown data" %}"
             title="{% trans "Export the shown data as a CSV file" %}">{% trans "Export CSV" %}</a>
        {% endif %}
      </div>
    </div>
  </form>
</div>
