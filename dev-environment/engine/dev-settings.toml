DEBUG = true

secret_value = "THIS VALUE IS NOT SECRET"

# Disabled in dev: the surrounding-number check is prone to false negatives
# (see docs/decision-history.md)
CPRRULE_CONTEXT_NUMBER_CHECK = false
# [logging]
LOG_LEVEL = "DEBUG"

[amqp]
# Nested amqp settings are picked up by the common amqp utility module
AMQP_HOST = "queue"
AMQP_USER = "os2ds"
AMQP_PWD = "os2ds"

# timeout for requests (in seconds)
timeout = 20
ttl = 25

[pipeline]
extra_modules = [".model._staging.sbsysdb"]

[pipeline.worker]
CHECK_DUPLICATION = true

[model.sbsysdb]
document_proxy = "http://document_proxy:5000/"
